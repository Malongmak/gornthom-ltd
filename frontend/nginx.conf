server {
    listen 80;
    root /usr/share/nginx/html;
    index public/index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve portal pages cleanly
    location = /portal {
        rewrite ^ /public/index.html last;
    }
    location = /portal/packages {
        rewrite ^ /public/packages.html last;
    }
    location = /portal/session {
        rewrite ^ /public/session.html last;
    }

    gzip on;
    gzip_types text/css application/javascript text/html;
}
